<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>bgremove — background removal</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header>
      <h1>bgremove</h1>
      <p class="tagline">Drop a picture — keep only the main subject.</p>
    </header>

    <main>
      <section id="dropzone" class="dropzone" tabindex="0">
        <input id="file-input" type="file" accept="image/*" multiple hidden />
        <div class="dropzone-inner">
          <p><strong>Drag &amp; drop</strong> one or more images here</p>
          <p class="muted">or click to choose files</p>
        </div>
      </section>

      <div class="controls">
        <label>
          Model
          <select id="model">
            <option value="u2net" selected>u2net (general)</option>
            <option value="isnet-general-use">isnet (sharper edges)</option>
            <option value="u2net_human_seg">u2net (people)</option>
            <option value="u2netp">u2netp (fast/light)</option>
            <option value="silueta">silueta (small)</option>
          </select>
        </label>
        <label class="checkbox">
          <input id="alpha-matting" type="checkbox" />
          Alpha matting (refine hair/fur edges, slower)
        </label>
        <button id="rerun" type="button" class="button" disabled>
          Re-run with selected model
        </button>
      </div>

      <div id="batch-actions" class="batch-actions" hidden>
        <button id="download-all" class="button" type="button">
          Download all
        </button>
      </div>

      <p id="status" class="status" role="status" aria-live="polite"></p>

      <section id="gallery" class="gallery" hidden></section>

      <!-- Template for one result card, cloned per image in app.js. -->
      <template id="card-template">
        <figure class="card">
          <div class="image-wrap checkerboard">
            <div class="spinner"></div>
            <img class="card-result" alt="result" hidden />
          </div>
          <figcaption class="card-name"></figcaption>
          <span class="card-status muted"></span>
          <a class="button card-download" hidden>Download</a>
        </figure>
      </template>

      <p class="muted hint">
        The first request for a given model downloads it (~170&nbsp;MB for the
        large ones), so it can take a while. The page stays usable meanwhile.
      </p>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
