name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  python-package:
    name: Build Python package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*

  container:
    name: Build & push container (nix2container)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build the package
        run: nix build .#default --print-build-logs

      - name: Build the container image
        run: nix build .#container --print-build-logs

      # Push only on pushes to main / tags — never on pull requests.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image (latest + commit SHA)
        if: github.event_name != 'pull_request'
        run: |
          # Avoid skopeo registries.conf version mismatch issue
          touch $HOME/.config/containers/registries.conf
          nix run .#container.copyToRegistry
          nix run .#container.copyTo -- \
            docker://ghcr.io/rustyshare/bgremove:${{ github.sha }}
